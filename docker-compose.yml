services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codepilot-postgres
    environment:
      POSTGRES_USER: codepilot
      POSTGRES_PASSWORD: codepilot
      POSTGRES_DB: codepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codepilot-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
